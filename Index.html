<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簿記 — 記帳 App</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0f1117; color: #e8e4dc; font-family: 'Noto Serif TC', Georgia, serif; }

  header { background: rgba(22,24,31,.95); border-bottom: 1px solid #2a2d38; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); }
  .header-inner { max-width: 680px; margin: 0 auto; padding: 0 20px; height: 58px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { background: linear-gradient(135deg,#c9a84c,#e8cc88); color: #0f1117; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #e8cc88; }
  nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; color: #888; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 400; transition: all .2s; }
  .nav-btn.active { background: #c9a84c22; color: #e8cc88; font-weight: 600; }

  main { max-width: 680px; margin: 0 auto; padding: 24px 20px 60px; }
  .view { display: none; animation: fadeIn .3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .card { background: #16181f; border: 1px solid #22242e; border-radius: 16px; padding: 20px; margin-bottom: 18px; }
  .balance-card { background: linear-gradient(135deg,#1e2130,#252840); border: 1px solid #2e3250; border-radius: 20px; padding: 26px 26px 20px; margin-bottom: 18px; }
  .balance-label { font-size: 12px; color: #8888aa; letter-spacing: 2px; margin-bottom: 6px; }
  .balance-amount { font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 22px; }
  .balance-amount.positive { color: #a8edaf; }
  .balance-amount.negative { color: #f4a4a4; }
  .balance-stats { display: flex; align-items: center; }
  .balance-stat { flex: 1; display: flex; align-items: center; gap: 10px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.income { background: #7ddba3; }
  .stat-dot.expense { background: #f08080; }
  .stat-label { font-size: 11px; color: #8888aa; margin-bottom: 2px; }
  .stat-value { font-size: 15px; font-weight: 600; }
  .stat-divider { width: 1px; height: 36px; background: #2e3250; margin: 0 18px; }

  .section-title { font-size: 12px; letter-spacing: 2px; color: #c9a84c; margin-bottom: 14px; font-weight: 600; }
  .empty { color: #555; text-align: center; padding: 20px 0; font-size: 14px; }

  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; }
  .cat-name { width: 80px; font-size: 12px; color: #aaa; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; height: 6px; background: #22242e; border-radius: 3px; overflow: hidden; }
  .cat-bar { height: 100%; background: linear-gradient(90deg,#c9a84c,#e8cc88); border-radius: 3px; transition: width .6s ease; }
  .cat-amt { width: 80px; font-size: 12px; color: #e8cc88; text-align: right; flex-shrink: 0; }

  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #1e2028; border-radius: 8px; transition: background .2s; }
  .txn-row:hover { background: #1a1c24; }
  .txn-row:hover .action-btn { opacity: 1 !important; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  .txn-badge { width: 38px; height: 38px; background: #1e2130; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .txn-cat { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .txn-meta { font-size: 12px; color: #666; }
  .txn-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .txn-amt { font-size: 15px; font-weight: 700; }
  .txn-amt.income { color: #7ddba3; }
  .txn-amt.expense { color: #f08080; }
  .txn-actions { display: flex; gap: 4px; }
  .action-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 5px; opacity: 0.3; transition: opacity .2s; }
  .more-btn { margin-top: 10px; background: none; border: none; color: #c9a84c; cursor: pointer; font-size: 13px; font-family: inherit; padding: 0; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-btn { background: #16181f; border: 1px solid #22242e; color: #888; padding: 7px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all .2s; }
  .filter-btn.active { background: #c9a84c22; border-color: #c9a84c; color: #e8cc88; }

  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 22px; color: #e8cc88; letter-spacing: 1px; }
  .type-toggle { display: flex; background: #0f1117; border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
  .type-btn { flex: 1; padding: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; transition: all .2s; background: none; color: #666; }
  .type-btn.active-expense { background: #f0808022; color: #f08080; }
  .type-btn.active-income { background: #7ddba322; color: #7ddba3; }
  .form-label { display: block; font-size: 11px; color: #8888aa; letter-spacing: 1px; margin-bottom: 7px; }
  .amount-wrap { display: flex; align-items: center; background: #0f1117; border: 1px solid #2a2d38; border-radius: 10px; padding: 0 14px; margin-bottom: 18px; }
  .currency-sym { color: #c9a84c; font-size: 16px; font-weight: 600; margin-right: 8px; flex-shrink: 0; }
  #amount-input { flex: 1; background: none; border: none; color: #e8e4dc; font-size: 28px; font-weight: 700; padding: 12px 0; outline: none; font-family: inherit; width: 100%; }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .cat-chip { background: #0f1117; border: 1px solid #2a2d38; color: #888; padding: 7px 11px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all .2s; }
  .cat-chip.active { background: #c9a84c22; border-color: #c9a84c; color: #e8cc88; }
  .form-input { width: 100%; background: #0f1117; border: 1px solid #2a2d38; border-radius: 10px; padding: 11px 14px; color: #e8e4dc; font-size: 14px; font-family: inherit; margin-bottom: 16px; outline: none; }
  .form-input:focus { border-color: #c9a84c55; }
  .submit-btn { width: 100%; background: linear-gradient(135deg,#c9a84c,#e8cc88); color: #0f1117; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 1px; margin-bottom: 10px; transition: all .2s; }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px #c9a84c40; }
  .cancel-btn { width: 100%; background: none; border: 1px solid #2a2d38; color: #888; border-radius: 10px; padding: 11px; font-size: 14px; cursor: pointer; font-family: inherit; display: none; }

  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">帳</div>
      <span class="logo-text">簿記</span>
    </div>
    <nav>
      <button class="nav-btn active" onclick="switchView('dashboard')">總覽</button>
      <button class="nav-btn" onclick="switchView('transactions')">明細</button>
      <button class="nav-btn" onclick="switchView('add')">記帳</button>
    </nav>
  </div>
</header>

<main>
  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view active">
    <div class="balance-card">
      <div class="balance-label">本月結餘</div>
      <div class="balance-amount" id="balance-amount">NT$0</div>
      <div class="balance-stats">
        <div class="balance-stat">
          <span class="stat-dot income"></span>
          <div>
            <div class="stat-label">收入</div>
            <div class="stat-value" id="total-income">NT$0</div>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="balance-stat">
          <span class="stat-dot expense"></span>
          <div>
            <div class="stat-label">支出</div>
            <div class="stat-value" id="total-expense">NT$0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">支出分類</div>
      <div id="cat-chart"></div>
    </div>
    <div class="card">
      <div class="section-title">最近記錄</div>
      <div id="recent-list"></div>
      <button class="more-btn" id="more-btn" onclick="switchView('transactions')" style="display:none">查看全部 →</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="view-transactions" class="view">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('income',this)">收入</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">支出</button>
    </div>
    <div class="card">
      <div id="txn-list"></div>
    </div>
  </div>

  <!-- ADD / EDIT -->
  <div id="view-add" class="view">
    <div class="card">
      <div class="form-title" id="form-title">新增記錄</div>
      <div class="type-toggle">
        <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">支出</button>
        <button class="type-btn" id="btn-income" onclick="setType('income')">收入</button>
      </div>
      <label class="form-label">金額</label>
      <div class="amount-wrap">
        <span class="currency-sym">NT$</span>
        <input type="number" id="amount-input" placeholder="0" min="0">
      </div>
      <label class="form-label">分類</label>
      <div class="cat-grid" id="cat-grid"></div>
      <label class="form-label">備註</label>
      <input type="text" class="form-input" id="note-input" placeholder="選填">
      <label class="form-label">日期</label>
      <input type="date" class="form-input" id="date-input">
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">新增記錄</button>
      <button class="cancel-btn" id="cancel-btn" onclick="cancelEdit()">取消編輯</button>
    </div>
  </div>
</main>

<script>
const CATEGORIES = {
  expense: ["🍜 餐飲","🚇 交通","🛍️ 購物","🏠 住房","💊 醫療","🎮 娛樂","📚 教育","✈️ 旅遊","💡 水電","📦 其他"],
  income:  ["💼 薪資","📈 投資","🎁 獎金","🏪 副業","💰 其他收入"]
};

let txns = [
  { id:1, type:"income",  category:"💼 薪資", amount:52000, note:"三月薪資",    date:"2026-03-05" },
  { id:2, type:"expense", category:"🍜 餐飲", amount:3200,  note:"本週伙食",    date:"2026-03-06" },
  { id:3, type:"expense", category:"🚇 交通", amount:1200,  note:"悠遊卡儲值",  date:"2026-03-07" },
  { id:4, type:"expense", category:"🛍️ 購物", amount:4500,  note:"春季採購",    date:"2026-03-08" },
  { id:5, type:"income",  category:"📈 投資", amount:3200,  note:"股息收入",    date:"2026-03-09" },
  { id:6, type:"expense", category:"🎮 娛樂", amount:890,   note:"電影 & 串流", date:"2026-03-10" },
];

let currentType = "expense";
let currentCategory = CATEGORIES.expense[0];
let currentFilter = "all";
let editId = null;

const fmt = n => new Intl.NumberFormat("zh-TW",{style:"currency",currency:"TWD",maximumFractionDigits:0}).format(n);
const today = () => new Date().toISOString().slice(0,10);

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const map = {dashboard:0, transactions:1, add:2};
  btns[map[v]].classList.add('active');
  if (v === 'dashboard') renderDashboard();
  if (v === 'transactions') renderTxnList();
  if (v === 'add' && editId === null) resetForm();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTxnList();
}

function setType(type) {
  currentType = type;
  currentCategory = CATEGORIES[type][0];
  document.getElementById('btn-expense').className = 'type-btn' + (type==='expense' ? ' active-expense' : '');
  document.getElementById('btn-income').className  = 'type-btn' + (type==='income'  ? ' active-income'  : '');
  renderCatGrid();
}

function renderCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES[currentType].map(cat =>
    `<button class="cat-chip${cat===currentCategory?' active':''}" onclick="selectCat(this,'${cat.replace(/'/g,"\\'")}'')">${cat}</button>`
  ).join('');
}

function selectCat(el, cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function resetForm() {
  editId = null;
  currentType = 'expense';
  currentCategory = CATEGORIES.expense[0];
  document.getElementById('form-title').textContent = '新增記錄';
  document.getElementById('submit-btn').textContent = '新增記錄';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('amount-input').value = '';
  document.getElementById('note-input').value = '';
  document.getElementById('date-input').value = today();
  document.getElementById('btn-expense').className = 'type-btn active-expense';
  document.getElementById('btn-income').className  = 'type-btn';
  renderCatGrid();
}

function handleSubmit() {
  const amount = parseFloat(document.getElementById('amount-input').value);
  if (!amount || amount <= 0) { alert('請輸入有效金額'); return; }
  const note = document.getElementById('note-input').value;
  const date = document.getElementById('date-input').value || today();
  if (editId !== null) {
    txns = txns.map(t => t.id === editId ? {...t, type:currentType, category:currentCategory, amount, note, date} : t);
    editId = null;
  } else {
    txns.push({ id: Date.now(), type:currentType, category:currentCategory, amount, note, date });
  }
  switchView('transactions');
}

function cancelEdit() {
  resetForm();
}

function editTxn(id) {
  const t = txns.find(t => t.id === id);
  if (!t) return;
  editId = id;
  currentType = t.type;
  currentCategory = t.category;
  document.getElementById('form-title').textContent = '編輯記錄';
  document.getElementById('submit-btn').textContent = '儲存變更';
  document.getElementById('cancel-btn').style.display = 'block';
  document.getElementById('amount-input').value = t.amount;
  document.getElementById('note-input').value = t.note;
  document.getElementById('date-input').value = t.date;
  document.getElementById('btn-expense').className = 'type-btn' + (t.type==='expense' ? ' active-expense' : '');
  document.getElementById('btn-income').className  = 'type-btn' + (t.type==='income'  ? ' active-income'  : '');
  renderCatGrid();
  switchView('add');
}

function deleteTxn(id) {
  if (!confirm('確認刪除此筆記錄？')) return;
  txns = txns.filter(t => t.id !== id);
  renderDashboard();
  renderTxnList();
}

function txnRowHTML(t) {
  const sign = t.type === 'income' ? '+' : '-';
  const cls  = t.type === 'income' ? 'income' : 'expense';
  const emoji = t.category.slice(0,2);
  const catName = t.category.slice(2).trim();
  return `
    <div class="txn-row">
      <div class="txn-left">
        <div class="txn-badge">${emoji}</div>
        <div>
          <div class="txn-cat">${catName}</div>
          <div class="txn-meta">${t.note||'—'} · ${t.date}</div>
        </div>
      </div>
      <div class="txn-right">
        <div class="txn-amt ${cls}">${sign}${fmt(t.amount)}</div>
        <div class="txn-actions">
          <button class="action-btn" onclick="editTxn(${t.id})">✏️</button>
          <button class="action-btn" onclick="deleteTxn(${t.id})">🗑️</button>
        </div>
      </div>
    </div>`;
}

function renderDashboard() {
  const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  const ba = document.getElementById('balance-amount');
  ba.textContent = fmt(balance);
  ba.className = 'balance-amount ' + (balance>=0?'positive':'negative');
  document.getElementById('total-income').textContent  = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);

  // Category chart
  const map = {};
  txns.filter(t=>t.type==='expense').forEach(t=>{ map[t.category]=(map[t.category]||0)+t.amount; });
  const cats = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const maxAmt = cats[0]?.[1] || 1;
  const chart = document.getElementById('cat-chart');
  chart.innerHTML = cats.length
    ? cats.map(([cat,amt])=>`
        <div class="cat-row">
          <span class="cat-name">${cat}</span>
          <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(amt/maxAmt)*100}%"></div></div>
          <span class="cat-amt">${fmt(amt)}</span>
        </div>`).join('')
    : '<div class="empty">尚無支出記錄</div>';

  // Recent
  const sorted = [...txns].sort((a,b)=>b.date.localeCompare(a.date));
  const recent = document.getElementById('recent-list');
  recent.innerHTML = sorted.length ? sorted.slice(0,5).map(txnRowHTML).join('') : '<div class="empty">尚無記錄</div>';
  document.getElementById('more-btn').style.display = sorted.length > 5 ? 'block' : 'none';
}

function renderTxnList() {
  const sorted = [...txns]
    .filter(t => currentFilter==='all' || t.type===currentFilter)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const list = document.getElementById('txn-list');
  list.innerHTML = sorted.length ? sorted.map(txnRowHTML).join('') : '<div class="empty">尚無記錄</div>';
}

// Init
document.getElementById('date-input').value = today();
renderCatGrid();
renderDashboard();
</script>
</body>
</html>
